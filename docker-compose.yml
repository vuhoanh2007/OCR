version: '3.8'

services:
  ocr-service:
    build: 
      context: .
      dockerfile: docker/Dockerfile
    container_name: cccd-ocr-service
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./models:/app/models
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
